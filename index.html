<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body { background-color: #121212; margin: 0; padding: 10px; font-family: sans-serif; }
  .product-card {
    border: 2px solid #ffcc00; border-radius: 12px; padding: 15px; text-align: center;
    background: #1e1e1e; max-width: 300px; margin: 50px auto; box-shadow: 0 4px 15px rgba(255, 204, 0, 0.2);
    transition: transform 0.3s ease;
  }
  .product-card:hover { transform: translateY(-5px); box-shadow: 0 6px 20px rgba(255, 204, 0, 0.5); }
  .product-card img { width: 100%; height: 180px; object-fit: cover; border-radius: 8px; }
  .product-title { font-size: 18px; font-weight: bold; margin: 15px 0 10px 0; color: #ffcc00; text-transform: uppercase; }
  .product-details { text-align: left; background: #2a2a2a; padding: 10px; border-radius: 6px; margin-bottom: 15px; font-size: 14px; color: #ffffff; line-height: 1.6; }
  .product-details span { color: #ff9900; font-weight: bold; }
  .product-price { color: #ff3333; font-size: 22px; font-weight: bold; margin-bottom: 15px; }
  .buy-btn {
    background: linear-gradient(135deg, #ffcc00, #ff9900); color: #121212; border: none; padding: 12px 0; 
    font-weight: bold; font-size: 16px; border-radius: 6px; cursor: pointer; width: 100%; display: block; text-decoration: none;
  }
  .buy-btn:hover { background: linear-gradient(135deg, #ff9900, #ff6600); color: #fff; }
</style>
</head>
<body>
  <div class="product-card">
    <img src="https://ibb.co" alt="ShopTrade Blox Fruits">
    <div class="product-title">Acc Blox Fruit Vip</div>
    <div class="product-details">
      • Level: <span>Max (2550)</span><br>
      • Trái ác quỷ: <span>Kitsune / Mochi V2</span><br>
      • Melee: <span>Godhuman</span><br>
      • Tộc: <span>Mink V4</span>
    </div>
    <div class="product-price">400.000 đ</div>
    <a href="https://zalo.me" target="_blank" class="buy-btn">MUA NGAY</a>
  </div>
</body>
</html>
